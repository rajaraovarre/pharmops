name: "[Reusable] Node.js CI/CD"

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-path:
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "18"

jobs:
  # ── Job 1: Install, Lint & Test ───────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ inputs.service-path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.service-path }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ inputs.service-path }}
        run: npm test -- --passWithNoTests

  # ── Job 2: Docker Build & Push ────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: echo "tag=$(echo '${{ github.sha }}' | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            -t $REGISTRY/${{ inputs.service-name }}:$IMAGE_TAG \
            -t $REGISTRY/${{ inputs.service-name }}:latest \
            ${{ inputs.service-path }}
          docker push $REGISTRY/${{ inputs.service-name }}:$IMAGE_TAG
          docker push $REGISTRY/${{ inputs.service-name }}:latest

  # ── Job 3: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: "Deploy → ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'develop' && 'qa' || 'dev' }}"
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push'
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'develop' && 'qa' || 'dev' }}
    steps:
      - name: Determine target environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "name=qa" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Update Helm chart and push
        env:
          TOKEN: ${{ secrets.HELM_CHARTS_TOKEN }}
          REPO: ${{ secrets.HELM_CHARTS_REPO }}
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image-tag }}
          DEPLOY_ENV: ${{ steps.env.outputs.name }}
        run: |
          git clone https://oauth2:${TOKEN}@${REPO#https://} helm-charts
          cd helm-charts
          git config user.email "github-actions[bot]@pharma.com"
          git config user.name "github-actions[bot]"
          FILE="envs/${DEPLOY_ENV}/values-${{ inputs.service-name }}.yaml"
          [ -f "$FILE" ] && sed -i "s/^  tag:.*/  tag: \"${IMAGE_TAG}\"/" "$FILE"
          git add .
          git diff --staged --quiet && exit 0
          git commit -m "ci: deploy ${{ inputs.service-name }}:${IMAGE_TAG} to ${DEPLOY_ENV} [skip ci]"
          git push
