name: "[Reusable] Spring Boot CI/CD"

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-path:
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  JAVA_VERSION: "17"

jobs:
  # ── Job 1: Build & Unit Test ─────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile and run tests
        working-directory: ${{ inputs.service-path }}
        run: mvn -B verify --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ inputs.service-name }}-${{ github.run_id }}
          path: ${{ inputs.service-path }}/target/surefire-reports/
          retention-days: 7

  # ── Job 2: OWASP Security Scan (non-blocking) ────────────────────────────
  security-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run OWASP Dependency Check
        working-directory: ${{ inputs.service-path }}
        run: mvn -B dependency-check:check --no-transfer-progress

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-${{ inputs.service-name }}-${{ github.run_id }}
          path: ${{ inputs.service-path }}/target/dependency-check-report.html
          retention-days: 7

  # ── Job 3: Docker Build & Push to ECR ────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    # Only push images on push events (not PRs)
    if: github.event_name == 'push'
    permissions:
      id-token: write   # Required for OIDC token exchange
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC (no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate short image tag from commit SHA
        id: meta
        run: echo "tag=$(echo '${{ github.sha }}' | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            -t $REGISTRY/${{ inputs.service-name }}:$IMAGE_TAG \
            -t $REGISTRY/${{ inputs.service-name }}:latest \
            ${{ inputs.service-path }}
          docker push $REGISTRY/${{ inputs.service-name }}:$IMAGE_TAG
          docker push $REGISTRY/${{ inputs.service-name }}:latest
          echo "Pushed: $REGISTRY/${{ inputs.service-name }}:$IMAGE_TAG"

  # ── Job 4: Update Helm values → triggers ArgoCD auto-sync ────────────────
  deploy:
    name: "Deploy → ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'develop' && 'qa' || 'dev' }}"
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push'
    # GitHub Environment — prod requires manual approval (configure in repo Settings)
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'develop' && 'qa' || 'dev' }}
    steps:
      - name: Determine target environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "name=qa" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Clone Helm charts repository
        env:
          TOKEN: ${{ secrets.HELM_CHARTS_TOKEN }}
          REPO: ${{ secrets.HELM_CHARTS_REPO }}
        run: git clone https://oauth2:${TOKEN}@${REPO#https://} helm-charts

      - name: Update image tag in Helm values file
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image-tag }}
          DEPLOY_ENV: ${{ steps.env.outputs.name }}
        run: |
          FILE="helm-charts/envs/${DEPLOY_ENV}/values-${{ inputs.service-name }}.yaml"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE not found"
            exit 1
          fi
          sed -i "s/^  tag:.*/  tag: \"${IMAGE_TAG}\"/" "$FILE"
          echo "Updated $FILE with tag: $IMAGE_TAG"
          cat "$FILE"

      - name: Commit and push Helm changes
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image-tag }}
          DEPLOY_ENV: ${{ steps.env.outputs.name }}
        run: |
          cd helm-charts
          git config user.email "github-actions[bot]@pharma.com"
          git config user.name "github-actions[bot]"
          git add .
          git diff --staged --quiet && echo "No changes — image tag already up to date" && exit 0
          git commit -m "ci: deploy ${{ inputs.service-name }}:${IMAGE_TAG} to ${DEPLOY_ENV} [skip ci]"
          git push
          echo "ArgoCD will auto-sync within 3 minutes for dev/qa (prod: manual sync)"
