name: "CI/CD — Api Gateway"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/api-gateway/**"
      - ".github/workflows/ci-api-gateway.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/api-gateway/**"

jobs:
  ci-cd:
    name: Api Gateway Pipeline
    uses: ./.github/workflows/_reusable-springboot.yml
    with:
      service-name: api-gateway
      service-path: services/api-gateway
    secrets: inherit   # Pass all repo secrets to the reusable workflow
