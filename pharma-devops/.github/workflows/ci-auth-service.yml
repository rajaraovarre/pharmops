name: "CI/CD — Auth Service"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/auth-service/**"
      - ".github/workflows/ci-auth-service.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/auth-service/**"

jobs:
  ci-cd:
    name: Auth Service Pipeline
    uses: ./.github/workflows/_reusable-springboot.yml
    with:
      service-name: auth-service
      service-path: services/auth-service
    secrets: inherit   # Pass all repo secrets to the reusable workflow
