name: "CI/CD — Distribution Service"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/distribution-service/**"
      - ".github/workflows/ci-distribution-service.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/distribution-service/**"

jobs:
  ci-cd:
    name: Distribution Service Pipeline
    uses: ./.github/workflows/_reusable-springboot.yml
    with:
      service-name: distribution-service
      service-path: services/distribution-service
    secrets: inherit   # Pass all repo secrets to the reusable workflow
