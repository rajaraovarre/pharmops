name: "CI/CD — Drug Catalog Service"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/drug-catalog-service/**"
      - ".github/workflows/ci-drug-catalog-service.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/drug-catalog-service/**"

jobs:
  ci-cd:
    name: Drug Catalog Service Pipeline
    uses: ./.github/workflows/_reusable-springboot.yml
    with:
      service-name: drug-catalog-service
      service-path: services/drug-catalog-service
    secrets: inherit   # Pass all repo secrets to the reusable workflow
