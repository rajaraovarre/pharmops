name: "CI/CD — Inventory Service"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/inventory-service/**"
      - ".github/workflows/ci-inventory-service.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/inventory-service/**"

jobs:
  ci-cd:
    name: Inventory Service Pipeline
    uses: ./.github/workflows/_reusable-springboot.yml
    with:
      service-name: inventory-service
      service-path: services/inventory-service
    secrets: inherit   # Pass all repo secrets to the reusable workflow
