name: "CI/CD — Manufacturing Service"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/manufacturing-service/**"
      - ".github/workflows/ci-manufacturing-service.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/manufacturing-service/**"

jobs:
  ci-cd:
    name: Manufacturing Service Pipeline
    uses: ./.github/workflows/_reusable-springboot.yml
    with:
      service-name: manufacturing-service
      service-path: services/manufacturing-service
    secrets: inherit   # Pass all repo secrets to the reusable workflow
