name: "CI/CD — Notification Service"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/notification-service/**"
      - ".github/workflows/ci-notification-service.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/notification-service/**"

jobs:
  ci-cd:
    name: Notification Service Pipeline
    uses: ./.github/workflows/_reusable-nodejs.yml
    with:
      service-name: notification-service
      service-path: services/notification-service
    secrets: inherit   # Pass all repo secrets to the reusable workflow
