name: "CI/CD — Pharma Ui"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/pharma-ui/**"
      - ".github/workflows/ci-pharma-ui.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/pharma-ui/**"

jobs:
  ci-cd:
    name: Pharma Ui Pipeline
    uses: ./.github/workflows/_reusable-react.yml
    with:
      service-name: pharma-ui
      service-path: services/pharma-ui
    secrets: inherit   # Pass all repo secrets to the reusable workflow
