name: "CI/CD — Quality Control Service"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/quality-control-service/**"
      - ".github/workflows/ci-quality-control-service.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/quality-control-service/**"

jobs:
  ci-cd:
    name: Quality Control Service Pipeline
    uses: ./.github/workflows/_reusable-springboot.yml
    with:
      service-name: quality-control-service
      service-path: services/quality-control-service
    secrets: inherit   # Pass all repo secrets to the reusable workflow
