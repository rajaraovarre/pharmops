name: "CI/CD — Reporting Service"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/reporting-service/**"
      - ".github/workflows/ci-reporting-service.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/reporting-service/**"

jobs:
  ci-cd:
    name: Reporting Service Pipeline
    uses: ./.github/workflows/_reusable-springboot.yml
    with:
      service-name: reporting-service
      service-path: services/reporting-service
    secrets: inherit   # Pass all repo secrets to the reusable workflow
