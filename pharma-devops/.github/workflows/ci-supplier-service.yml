name: "CI/CD — Supplier Service"

# Triggers only when files in this service's directory change
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    paths:
      - "services/supplier-service/**"
      - ".github/workflows/ci-supplier-service.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/supplier-service/**"

jobs:
  ci-cd:
    name: Supplier Service Pipeline
    uses: ./.github/workflows/_reusable-springboot.yml
    with:
      service-name: supplier-service
      service-path: services/supplier-service
    secrets: inherit   # Pass all repo secrets to the reusable workflow
